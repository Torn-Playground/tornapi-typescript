name: Check Version
on:
    workflow_dispatch:
    schedule:
        - cron: "55 */4 * * *"

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            spec-version: ${{ steps.spec-version.outputs.prop }}
            version: ${{ steps.version.outputs.prop }}
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v7
              with:
                  node-version: 24.18.0
                  registry-url: "https://registry.npmjs.org"

            - run: npm ci

            - run: npm run generate-types

            - name: get spec version
              id: spec-version
              uses: kekedaine/github-action-json-property-by-lodash@0.2.0
              with:
                  path: dist/openapi.json
                  prop_path: "info.version"

            - name: get version
              id: version
              uses: kekedaine/github-action-json-property-by-lodash@0.2.0
              with:
                  path: package.json
                  prop_path: "version"

    trigger-publish:
        runs-on: ubuntu-latest
        needs: check-version
        if: ${{needs.check-version.outputs.version != needs.check-version.outputs.spec-version}}
        steps:
            - name: Workflow Dispatch
              uses: benc-uk/workflow-dispatch@v1.3.2
              with:
                  workflow: publish.yml
                  wait-for-completion: true
        
